name: splitcheck
description: "A new Flutter project."

publish_to: "none"


version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^17.1.0
  image_picker: ^1.1.1

  firebase_core: ^4.5.0
  firebase_auth: ^6.0.1
  cloud_firestore: ^6.1.3
  cloud_functions: ^6.0.7
  firebase_storage: ^13.0.0
  url_launcher: ^6.2.5
  share_plus: ^10.1.4
  qr_flutter: ^4.1.0
  image_gallery_saver_plus: ^3.0.5

dev_dependencies:

  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter


flutter:

  uses-material-design: true
  config:
    enable-swift-package-manager: false
